version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: drewisy-backend
    ports:
      - "8080:8080"
    env_file:
      - ./backend/.env
    environment:
      # SADECE Docker ağına özel olanları eziyoruz. 
      # Şifre vb. her şey doğrudan env_file ile backend/.env'den gelecek.
      - DB_HOST=db
      - DB_PORT=5432
    volumes:
      - ./backend/uploads:/root/uploads
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    container_name: drewisy-db
    ports:
      - "5434:5432"
    environment:
      # Local Geliştirme (Dev) ortamı için veritabanı ayarlarını statik tutuyoruz.
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=secret
      - POSTGRES_DB=drewisy
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped

volumes:
  pgdata: