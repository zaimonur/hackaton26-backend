version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: drewisy-backend
    ports:
      - "8080:8080"
    env_file:
      - ./backend/.env
    environment:
      # Değerleri hardcode yazmak yerine .env dosyasından çekiyoruz
      - DB_HOST=db
      - DB_PORT=${DB_PORT:-5432}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME:-drewisy}
      - DB_SSLMODE=${DB_SSLMODE:-disable}
      - PORT=${PORT:-8080}
    volumes:
      - ./backend/uploads:/root/uploads
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    container_name: drewisy-db
    ports:
      - "5434:5432" # Host: 5434, Container: 5432
    environment:
      # Burada da şifreyi .env dosyasındaki DB_PASSWORD değişkeninden alıyoruz
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME:-drewisy}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped

volumes:
  pgdata: